name: CI

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  quality:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install -c constraints.txt setuptools wheel
          python -m pip install --no-build-isolation -c constraints.txt -e ".[dev]"

      - name: Ruff
        run: ruff check src tests

      - name: Mypy
        run: mypy src/vulle

      - name: Tests and coverage
        run: pytest --cov=vulle --cov-report=term-missing

      - name: Bandit
        run: bandit -q -r src/vulle

      - name: Dependency audit
        run: pip-audit --requirement constraints.txt

      - name: Validate Docker Compose
        run: docker compose config

  secrets:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Scan repository secrets
        uses: gitleaks/gitleaks-action@v2
